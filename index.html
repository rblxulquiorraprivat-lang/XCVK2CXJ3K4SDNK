                                ${persona.name || 'Unnamed Persona'}
                                ${isDefault ? '<span style="font-size:0.75rem; margin-left:8px; color:#c4b5fd;">Default</span>' : ''}
                            </div>
                            <div class="card-subtitle" style="color: ${persona.color || '#94a3b8'}">${persona.generally || 'No Description'}</div>
                            <div class="card-desc">${persona.appearance || 'No Appearance Details Available.'}</div>
                            <div class="card-footer" style="gap: 10px; margin-top: 16px;">
                                <button type="button" class="card-btn card-btn-primary" onclick="${isDefault ? `clearSelectedPersona()` : `setSelectedPersona(${persona.id})`}">${isDefault ? 'Not Default' : 'Set as Default'}</button>
                                <button type="button" class="card-btn card-btn-edit" onclick="startPersonaEdit(${persona.id})">Edit</button>
                                <button type="button" class="card-btn card-btn-delete card-btn-icon" onclick="deletePersona(${persona.id})" title="Delete">${TRASH_ICON_SVG}</button>
                            </div>
                        </div>
                    </div>
                `}).join('') : '';

                main.innerHTML = `
                    <div class="animate-in">
                        <button class="back-btn" onclick="goBackToLibrary()">
                            <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:currentColor;"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                            Back to Library
                        </button>

                        <div class="library-topbar" style="margin-bottom: 40px;">
                            <div class="library-title">
                                <h2>🎭 Personas</h2>
                                <p>Manage your chat personas and create new ones for AI dialogue.</p>
                            </div>
                        </div>

                        <div class="detail-grid" style="grid-template-columns: 1.4fr 0.9fr; gap: 24px; align-items: start;">
                            <div class="detail-panel" style="max-height: calc(100vh - 260px); overflow: auto;">
                                <h3>Your Personas</h3>
                                <input id="personaSearchInput" type="text" placeholder="Search Personas..." value="${personaViewSearchQuery}" oninput="updatePersonaViewSearch(event)" style="width:100%; background: #1f2937; color:#fff; border:1px solid var(--border-color); padding:12px 14px; border-radius:14px; margin-top: 12px;">
                                ${personas.length ? `<div class="library-grid" style="grid-template-columns: 1fr; gap: 16px; padding: 0; margin-top: 16px;">${personaCards}</div>` : `<p style="color: var(--text-muted); margin-top: 16px;">No personae available. Create a new persona with cover, generally, and appearance details.</p>`}
                            </div>
                            <div class="detail-panel" style="max-height: calc(100vh - 260px); overflow: auto;">
                                <h3>${editingPersonaId ? 'Edit Persona' : 'Create Persona'}</h3>
                                <form onsubmit="savePersona(event)">
                                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 8px;">
                                        <label style="font-weight:600;">${editingPersonaId ? 'Edit Persona' : 'Create Persona'}</label>
                                        <input id="personaName" type="text" placeholder="Persona Name" value="${editingPersonaId ? (personas.find(p => p.id === editingPersonaId)?.name || '') : ''}" style="width:100%; background: #27272a; color:#fff; border:1px solid var(--border-color); padding:10px 14px; border-radius:12px;" required>
                                    </div>
                                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 8px;">
                                        <label style="font-weight:600;">Cover (URL)</label>
                                        <input id="personaCover" type="url" placeholder="https://..." value="${editingPersonaId ? (personas.find(p => p.id === editingPersonaId)?.cover || '') : ''}" style="width:100%; background: #27272a; color:#fff; border:1px solid var(--border-color); padding:10px 14px; border-radius:12px;">
                                    </div>
                                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 8px;">
                                        <label style="font-weight:600;">Generally</label>
                                        <textarea id="personaGenerally" rows="3" placeholder="General Information about the Persona" style="width:100%; background: #27272a; color:#fff; border:1px solid var(--border-color); padding:10px 14px; border-radius:12px;">${editingPersonaId ? (personas.find(p => p.id === editingPersonaId)?.generally || '') : ''}</textarea>
                                    </div>
                                    <div class="settings-row" style="flex-direction: column; align-items: flex-start; gap: 8px;">
                                        <label style="font-weight:600;">Appearance</label>
                                        <textarea id="personaAppearance" rows="3" placeholder="Appearance of the Persona" style="width:100%; background: #27272a; color:#fff; border:1px solid var(--border-color); padding:10px 14px; border-radius:12px;">${editingPersonaId ? (personas.find(p => p.id === editingPersonaId)?.appearance || '') : ''}</textarea>
                                    </div>
                                    <div style="display:flex; gap: 10px; margin-top: 16px;">
                                        <button type="submit" class="create-btn" style="flex:1;">${editingPersonaId ? 'Save Changes' : 'Save Persona'}</button>
                                        ${editingPersonaId ? '<button type="button" class="card-btn card-btn-delete" style="flex:1; background: rgba(255,255,255,0.05); color:#f8fafc;" onclick="cancelPersonaEdit()">Cancel</button>' : ''}
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                `;
                populatePersonaFormFields();
                return;
            }

            // 1. SETTINGS ANSICHT
            if (isSettingsActive) {
                main.innerHTML = `
                    <div class="animate-in">
                        <button class="back-btn" onclick="goBackToLibrary()">
                            <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:currentColor;"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                            Back to the library
                        </button>

                        <div class="library-topbar" style="margin-bottom: 40px;">
                            <div class="library-title">
                                <h2>⚙️ Settings</h2>
                                <p>Adjust the app configuration and your AI API keys.</p>
                            </div>
                        </div>

                        <div class="detail-grid" style="grid-template-columns: 1fr;">
                            <div class="detail-panel">
                                <h3>🧠 AI Settings</h3>
                                <div class="settings-row">
                                    <div class="settings-row-info">
                                        <h4>Test Size</h4>
                                        <p>Choose the desired response length for the AI.</p>
                                    </div>
                                    <select id="settingsTextSize" onchange="setSetting('textSize', this.value)" style="background: #27272a; color:#fff; border: 1px solid var(--border-color); padding: 8px 16px; border-radius: 10px; font-weight:600;">
                                        <option value="Short" ${settings.textSize === 'Short' ? 'selected' : ''}>Short</option>
                                        <option value="Middle" ${settings.textSize === 'Middle' ? 'selected' : ''}>Middle</option>
                                        <option value="Long" ${settings.textSize === 'Long' ? 'selected' : ''}>Long</option>
                                    </select>
                                </div>
                                <div class="settings-row">
                                    <div class="settings-row-info">
                                        <h4>Language</h4>
                                        <p>Choose the language for the AI responses.</p>
                                    </div>
                                    <select id="settingsLanguage" onchange="setSetting('language', this.value)" style="background: #27272a; color:#fff; border: 1px solid var(--border-color); padding: 8px 16px; border-radius: 10px; font-weight:600;">
                                        <option value="English" ${settings.language === 'English' ? 'selected' : ''}>English</option>
                                        <option value="German" ${settings.language === 'German' ? 'selected' : ''}>German</option>
                                        <option value="Spanish" ${settings.language === 'Spanish' ? 'selected' : ''}>Spanish</option>
                                        <option value="French" ${settings.language === 'French' ? 'selected' : ''}>French</option>
                                    </select>
                                </div>
                                <div class="settings-row">
                                    <div class="settings-row-info">
                                        <h4>Memory System</h4>
                                        <p>Choose how the AI remembers your conversation history.</p>
                                    </div>
                                    <select id="settingsMemorySystem" onchange="setMemorySystem(this.value)" style="background: #27272a; color:#fff; border: 1px solid var(--border-color); padding: 8px 16px; border-radius: 10px; font-weight:600;">
                                        <option value="Orama" ${settings.memorySystem === 'Orama' ? 'selected' : ''}>Orama</option>
                                        <option value="Transformer.js" ${settings.memorySystem === 'Transformer.js' ? 'selected' : ''}>Transformer.js</option>
                                    </select>
                                </div>
                                ${settings.memorySystem === 'Transformer.js' ? `
                                <div class="settings-row" id="loadModelRow">
                                    <div class="settings-row-info">
                                        <h4>Load Model</h4>
                                        <p>Loads the local embedding model used for Transformer.js memory. No external servers are contacted.</p>
                                    </div>
                                    <button
                                        id="modelStatusBtn"
                                        onclick="loadTransformerModelFromSettings()"
                                        ${modelStatus === 'loading' ? 'disabled' : ''}
                                        style="
                                            padding: 8px 16px;
                                            border-radius: 10px;
                                            border: none;
                                            font-weight: 600;
                                            cursor: ${modelStatus === 'loading' ? 'wait' : 'pointer'};
                                            transition: background-color 0.2s ease, color 0.2s ease;
                                            background: ${modelStatus === 'loaded' ? '#22c55e' : '#ef4444'};
                                            color: ${modelStatus === 'loaded' ? '#052e13' : '#3f0d0d'};
                                        "
                                    >${modelStatus === 'loaded' ? 'Model loaded' : (modelStatus === 'loading' ? 'Loading model…' : 'Model not Loaded')}</button>
                                </div>
                                ` : ''}
                                <div class="settings-row">
                                    <div class="settings-row-info">
                                        <h4>Own API Key</h4>
                                        <p>Use your own API key for unlimited generations.</p>
                                    </div>
                                    <input type="password" id="settingsApiKey" value="${settings.apiKey || ''}" onchange="setSetting('apiKey', this.value)" placeholder="sk-proj-................" style="background: #27272a; color:#fff; border: 1px solid var(--border-color); padding: 8px 16px; border-radius: 10px; width: 250px;">
                                </div>
                            </div>

                            <div class="detail-panel" style="margin-top: 25px;">
                                <h3>🎨 Interface & Layout</h3>
                                <div class="settings-row">
                                    <div class="settings-row-info">
                                        <h4>Activate glow effects</h4>
                                        <p>Shows colored glow effects behind cards and avatars.</p>
                                    </div>
                                    <label class="toggle-switch">
                                        <input type="checkbox" checked>
                                        <span class="slider"></span>
                                    </label>
                                </div>
                                <div class="settings-row">
                                    <div class="settings-row-info">
                                        <h4>Advanced immersion mode</h4>
                                        <p>Discreetly hides UI elements during intensive role-playing games.</p>
                                    </div>
                                    <label class="toggle-switch">
                                        <input type="checkbox">
                                        <span class="slider"></span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                return;
            }

            // 2. BIBLIOTHEK (GRID VIEW)
            if (activeId === null) {
                let filteredItems = items.filter(item => {
                    const matchesFilter = currentFilter === 'all' || 
                                          (currentFilter === 'favorite' ? item.favorite : item.type === currentFilter);
                    const matchesSearch = item.name.toLowerCase().includes(searchQuery) || item.description.toLowerCase().includes(searchQuery);
                    return matchesFilter && matchesSearch;
                });

                filteredItems.sort((a, b) => (b.id || 0) - (a.id || 0));

                // Hinweis: Das eigentliche Karten-Markup wird zentral in renderLibraryGrid()
                // erzeugt und weiter unten per renderLibraryGrid() in #libraryGrid gerendert.
                // (Vorher gab es hier eine zweite, unbenutzte Kopie desselben Karten-Markups,
                // die nie ins DOM eingefügt wurde und bei jeder UI-Änderung - z.B. neue
                // Buttons - separat gepflegt werden musste. Entfernt, um Divergenz zu vermeiden.)

                // Prüfen ob es Favoriten gibt
                const hasFavorites = items.some(item => item.favorite);

                main.innerHTML = `
                    <div class="library-topbar animate-in">
                        <div class="library-title">
                            <h2>Your library</h2>
                            <p>Manage all your created and saved adventures.</p>
                        </div>
                        <div class="topbar-actions">
                            <div class="search-container">
                                <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                                <input id="searchInput" type="text" placeholder="Search library..." value="${searchQuery}" onkeyup="handleSearch(event)">
                            </div>
                            <div class="create-menu-wrapper" id="createMenuWrapper">
                                <div class="create-menu-backdrop" id="createMenuBackdrop" style="display: ${isCreateMenuOpen ? 'block' : 'none'};" onclick="closeCreateChoice()"></div>
                                <button class="create-btn" onclick="openCreateChoice(event)">+ Create</button>
                                <div class="create-menu" id="createMenu" style="display: ${isCreateMenuOpen ? 'grid' : 'none'};">${createMenuContentHTML()}</div>
                            </div>
                        </div>
                    </div>

                    <div id="filterTabs" class="filter-tabs animate-in"></div>
                    <div id="libraryGrid" class="library-grid"></div>
                `;
                renderFilterTabs();
                renderLibraryGrid();
                return;
            } else {
                // 3. DETAIL ANSICHT
                const item = items.find(i => i.id === activeId);
                if(!item) return;

                const tagsHTML = item.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
                let btnText = item.type === 'character' ? 'Chat starten' : item.type === 'world' ? 'Welt betreten' : item.type === 'lorebook' ? 'Lorebook öffnen' : 'Story fortsetzen';
                const isCharacterDetail = item.type === 'character';
                const isLorebookDetail = item.type === 'lorebook';
                const isStoryDetail = item.type === 'story';
                const idArgDetail = JSON.stringify(item.id);
                const idParamDetail = encodeURIComponent(String(item.id));
                const editHandlerDetail = (isStoryDetail || isCharacterDetail)
                    ? `window.location.href="Character/CreateCharacter.html?id=${idParamDetail}"`
                    : isLorebookDetail
                        ? `window.location.href="Lorebook/CreateLorebook.html?id=${idParamDetail}"`
                        : `openWorldEditor(${idArgDetail})`;

                main.innerHTML = `
                    <div class="animate-in">
                        <button class="back-btn" onclick="goBackToLibrary()">
                            <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:currentColor;"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                            Back to Library
                        </button>

                        <div class="detail-hero">
                            <div class="detail-avatar" style="background-image: url('${item.avatar}'); border-color: ${item.color}"></div>
                            <div class="detail-info">
                                <h1>${item.name}</h1>
                            </div>
                        </div>

                        <div class="detail-grid">
                            <div class="detail-panel">
                                <h3>📝 Lore & Hintergrund</h3>
                                <p style="color: #cbd5e1; line-height: 1.6;">${item.description}</p>
                                <div class="tags-container">${tagsHTML}</div>
                            </div>
                            
                            <div>
                                <button class="action-btn-large" style="background-color: ${item.color}; box-shadow: 0 4px 20px ${item.color}44;" onclick='playItem(${idArgDetail})'>
                                    ${btnText}
                                </button>
                                <div class="detail-actions-row">
                                    <button class="card-btn card-btn-edit" onclick='${editHandlerDetail}'>Edit</button>
                                    ${isStoryDetail ? `<button class="card-btn card-btn-edit" onclick='duplicateItem(${idArgDetail})'>Duplicate</button>` : ''}
                                    ${isCharacterDetail ? `<button class="card-btn card-btn-save card-btn-icon" onclick='saveCharacterFromCard(event, ${idArgDetail})' title="Save">${DOWNLOAD_ICON_SVG}</button>` : ''}
                                    <button class="card-btn card-btn-delete card-btn-icon" onclick='deleteItemFromDetail(event, ${idArgDetail})' title="Delete">${TRASH_ICON_SVG}</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        function renderApp() {
            renderSidebar();
            renderMainArea();
        }

        // Initialisierung: erst alle Daten aus IndexedDB (Dexie) laden, dann rendern.
        initApp();
    </script>
</body>
</html>

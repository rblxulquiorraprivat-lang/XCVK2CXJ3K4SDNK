<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story AI - Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #13151f 0%, #0a0b10 100%);
            color: #f5f6fa;
            min-height: 100vh;
            padding-bottom: 60px;
        }

        /* Top Bar mit Settings und Logo */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            margin-bottom: 20px;
        }

        .logo-container {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .top-bar h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .header-actions {
            display: flex;
            gap: 15px;
            flex: 1;
            justify-content: flex-end;
        }

        /* Icon Buttons (Settings, Profil, etc.) */
        .icon-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: rotate(30deg);
            border-color: #a5b4fc;
            box-shadow: 0 0 10px rgba(165, 180, 252, 0.3);
        }

        .icon-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        /* Haupt-Navigationsknöpfe */
        .main-nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #a0aabf;
            padding: 12px 35px;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .tab-btn.active {
            background: rgba(99, 102, 241, 0.15);
            color: #fff;
            border-color: #6366f1;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        .tab-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        /* Suchleiste */
        .search-container {
            max-width: 600px;
            margin: 0 auto 50px auto;
            padding: 0 20px;
            position: relative;
        }

        .search-bar {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 25px 16px 50px;
            border-radius: 30px;
            color: #fff;
            font-size: 1.05rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-bar:focus {
            border-color: #6366f1;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
            background: rgba(0, 0, 0, 0.7);
        }

        .search-icon {
            position: absolute;
            left: 40px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            fill: #a0aabf;
        }

        /* Content Sektionen */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .content-section {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .content-section.active {
            display: block;
        }

        /* Grid Layout für Cards */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 30px;
            justify-content: center;
        }

        /* Action Card (Der "Create" Button im gleichen Look) */
        .create-card {
            background: rgba(255, 255, 255, 0.02);
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            aspect-ratio: 3 / 4;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #a0aabf;
            padding: 20px;
            text-align: center;
        }

        .create-card:hover {
            background: rgba(99, 102, 241, 0.05);
            border-color: #6366f1;
            color: #fff;
            transform: translateY(-5px);
        }

        .create-card .plus-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            font-weight: 300;
        }

        .create-card span {
            font-size: 1.2rem;
            font-weight: 600;
        }

        /* Charakter & Welten Cards */
        .item-card {
            background: #151822;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 3 / 4;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .item-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Platzhalter Bilder */
        .card-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 1;
            transition: transform 0.6s ease;
        }

        .item-card:hover .card-bg {
            transform: scale(1.08);
        }

        /* Overlay für Lesbarkeit des Textes */
        .card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(15, 18, 28, 1) 0%, rgba(15, 18, 28, 0.7) 45%, rgba(0,0,0,0) 100%);
            z-index: 2;
        }

        /* Kleine Action-Buttons oben auf der Karte (Z.b. Löschen, Teilen) */
        .card-top-actions {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 3;
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .item-card:hover .card-top-actions {
            opacity: 1;
        }

        .mini-action-btn {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }

        .mini-action-btn:hover {
            background: #ef4444; /* Rot beim Hover für Löschen */
            border-color: #ef4444;
        }

        .mini-action-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* Card Content */
        .card-content {
            position: relative;
            z-index: 3;
            padding: 25px 20px 20px 20px;
            width: 100%;
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-meta {
            font-size: 0.85rem;
            color: #a0aabf;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        /* Buttons auf den Karten */
        .card-actions {
            display: flex;
            gap: 10px;
        }

        .card-btn {
            flex: 1;
            padding: 10px 10px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: filter 0.2s, transform 0.1s;
            text-align: center;
            color: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .card-btn:active {
            transform: scale(0.95);
        }

        /* Dynamische Farbe über hover-Filter (damit jede inline-Farbe klappt) */
        .btn-play:hover {
            filter: brightness(1.2) saturate(1.2);
        }

        .btn-edit {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            flex: 0.5; /* Edit Button ist etwas schmaler */
        }

        .btn-edit:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Spezielle Badge für World Cards */
        .world-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(16, 185, 129, 0.85);
            backdrop-filter: blur(4px);
            color: #fff;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            z-index: 3;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

    </style>
</head>
<body>

    <header class="top-bar">
        <div style="flex: 1;"></div>
        
        <div class="logo-container">
            <h1>Story AI</h1>
        </div>

        <div class="header-actions">
            <button class="icon-btn" title="Sync Cloud">
                <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/></svg>
            </button>
            <button class="icon-btn" title="Profile">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </button>
            <button class="icon-btn" title="Settings" onclick="alert('Settings geöffnet!')">
                <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
            </button>
        </div>
    </header>

    <div class="main-nav">
        <button class="tab-btn active" onclick="switchTab('characters')">YOUR CHARACTERS</button>
        <button class="tab-btn" onclick="switchTab('worlds')">YOUR WORLDS</button>
    </div>

    <div class="search-container">
        <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" class="search-bar" id="searchBar" placeholder="Searching for items...">
    </div>

    <div class="container">
        
        <div id="characters-section" class="content-section active">
            <div class="cards-grid">
                <div class="create-card" onclick="alert('Charakter-Erstellung öffnen...')">
                    <div class="plus-icon">+</div>
                    <span>Create Character</span>
                </div>

                <div class="item-card">
                    <div class="card-top-actions">
                        <button class="mini-action-btn" title="Löschen"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
                    </div>
                    <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1578632767115-351597cf2477?w=400&auto=format&fit=crop&q=80');"></div>
                    <div class="card-overlay"></div>
                    <div class="card-content">
                        <div class="card-title">Konata Izumi</div>
                        <div class="card-meta">
                            <span>Von: System</span>
                            <span>Active</span>
                        </div>
                        <div class="card-actions">
                            <button class="card-btn btn-play" style="background-color: #ec4899;" onclick="alert('Chat gestartet!')">Play</button>
                            <button class="card-btn btn-edit" onclick="alert('Editieren öffnen...')">Edit</button>
                        </div>
                    </div>
                </div>

                <div class="item-card">
                    <div class="card-top-actions">
                        <button class="mini-action-btn" title="Löschen"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
                    </div>
                    <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?w=400&auto=format&fit=crop&q=80');"></div>
                    <div class="card-overlay"></div>
                    <div class="card-content">
                        <div class="card-title">Kotonoha Katsura</div>
                        <div class="card-meta">
                            <span>Von: System</span>
                            <span>Active</span>
                        </div>
                        <div class="card-actions">
                            <button class="card-btn btn-play" style="background-color: #3b82f6;" onclick="alert('Chat gestartet!')">Play</button>
                            <button class="card-btn btn-edit" onclick="alert('Editieren öffnen...')">Edit</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="worlds-section" class="content-section">
            <div class="cards-grid">
                <div class="create-card" onclick="alert('Welten-Erstellung öffnen...')">
                    <div class="plus-icon">+</div>
                    <span>Create World</span>
                </div>

                <div class="item-card">
                    <span class="world-badge">5 Cards</span>
                    <div class="card-top-actions">
                        <button class="mini-action-btn" title="Löschen"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
                    </div>
                    <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400&auto=format&fit=crop&q=80');"></div>
                    <div class="card-overlay"></div>
                    <div class="card-content">
                        <div class="card-title">Neo-Tokyo 2077</div>
                        <div class="card-meta">
                            <span>Von: ModderX</span>
                            <span>Cyberpunk RPG</span>
                        </div>
                        <div class="card-actions">
                            <button class="card-btn btn-play" style="background-color: #10b981;" onclick="alert('Welt-RPG gestartet!')">Enter</button>
                            <button class="card-btn btn-edit" onclick="alert('Welten-Editor öffnen...')">Cards</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        function switchTab(tabName) {
            document.querySelectorAll('.content-section').forEach(section => {
                section.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            if(tabName === 'characters') {
                document.getElementById('characters-section').classList.add('active');
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('searchBar').placeholder = "Searching for characters...";
            } else {
                document.getElementById('worlds-section').classList.add('active');
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('searchBar').placeholder = "Searching for worlds...";
            }
        }

        document.getElementById('searchBar').placeholder = "Searching for characters...";
    </script>
</body>
</html>

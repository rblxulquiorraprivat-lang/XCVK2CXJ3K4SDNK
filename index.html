
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story AI - Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1c29 0%, #10111a 100%);
            color: #f5f6fa;
            min-height: 100vh;
            padding-bottom: 60px;
        }

        /* Header Style passend zum Screenshot */
        header {
            text-align: center;
            padding: 40px 20px 20px 20px;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }

        /* Haupt-Navigationsknöpfe */
        .main-nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 12px 30px;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .tab-btn.active {
            background: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
            border-color: #60a5fa;
        }

        .tab-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Suchleiste */
        .search-container {
            max-width: 600px;
            margin: 0 auto 40px auto;
            padding: 0 20px;
        }

        .search-bar {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 15px 25px;
            border-radius: 30px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
            text-align: center;
        }

        .search-bar:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }

        /* Content Sektionen */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        /* Grid Layout für Cards */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
            justify-content: center;
        }

        /* Action Card (Der "Create" Button im gleichen Look) */
        .create-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            aspect-ratio: 3 / 4;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: rgba(255, 255, 255, 0.6);
            padding: 20px;
            text-align: center;
        }

        .create-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: #3b82f6;
            color: #fff;
            transform: translateY(-5px);
        }

        .create-card .plus-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .create-card span {
            font-size: 1.2rem;
            font-weight: 600;
        }

        /* Charakter & Welten Cards */
        .item-card {
            background: rgba(15, 18, 30, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 3 / 4;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .item-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.4);
        }

        /* Platzhalter Bilder */
        .card-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 1;
            transition: transform 0.5s ease;
        }

        .item-card:hover .card-bg {
            transform: scale(1.05);
        }

        /* Overlay für Lesbarkeit des Textes */
        .card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(10, 11, 18, 0.95) 0%, rgba(10, 11, 18, 0.6) 40%, rgba(0,0,0,0) 100%);
            z-index: 2;
        }

        /* Card Content */
        .card-content {
            position: relative;
            z-index: 3;
            padding: 20px;
            width: 100%;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 4px;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-meta {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }

        /* Buttons auf den Karten */
        .card-actions {
            display: flex;
            gap: 8px;
        }

        .card-btn {
            flex: 1;
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: background 0.2s;
            text-align: center;
            text-decoration: none;
        }

        .btn-play {
            background: #2563eb;
            color: #fff;
        }

        .btn-play:hover {
            background: #1d4ed8;
        }

        .btn-edit {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-edit:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Spezielle Badge für World Cards */
        .world-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(16, 185, 129, 0.9);
            color: #fff;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            z-index: 3;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <header>
        <h1>Story AI</h1>
    </header>

    <!-- Navigation zwischen Characters und Worlds -->
    <div class="main-nav">
        <button class="tab-btn active" onclick="switchTab('characters')">YOUR CHARACTERS</button>
        <button class="tab-btn" onclick="switchTab('worlds')">YOUR WORLDS</button>
    </div>

    <!-- Dynamische Suchleiste -->
    <div class="search-container">
        <input type="text" class="search-bar" id="searchBar" placeholder="Searching for items...">
    </div>

    <!-- Hauptinhalt -->
    <div class="container">
        
        <!-- SEKTION: CHARAKTERE -->
        <div id="characters-section" class="content-section active">
            <div class="cards-grid">
                <!-- Erstellen Button -->
                <div class="create-card" onclick="alert('Charakter-Erstellung öffnen...')">
                    <div class="plus-icon">+</div>
                    <span>Create Character</span>
                </div>

                <!-- PLATZHALTER CHARAKTER (Beispiel Konata) -->
                <div class="item-card">
                    <!-- Platzhalter Hintergrundbild über Unsplash Anime-Style -->
                    <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1578632767115-351597cf2477?w=400&auto=format&fit=crop&q=80');"></div>
                    <div class="card-overlay"></div>
                    <div class="card-content">
                        <div class="card-title">Konata Izumi</div>
                        <div class="card-meta">
                            <span>Von: System</span>
                            <span>Active</span>
                        </div>
                        <div class="card-actions">
                            <button class="card-btn btn-play" onclick="alert('Chat gestartet!')">Play</button>
                            <button class="card-btn btn-edit" onclick="alert('Editieren öffnen...')">Edit</button>
                        </div>
                    </div>
                </div>

                <!-- PLATZHALTER CHARAKTER 2 (Beispiel Kotonoha) -->
                <div class="item-card">
                    <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?w=400&auto=format&fit=crop&q=80');"></div>
                    <div class="card-overlay"></div>
                    <div class="card-content">
                        <div class="card-title">Kotonoha Katsura</div>
                        <div class="card-meta">
                            <span>Von: System</span>
                            <span>Active</span>
                        </div>
                        <div class="card-actions">
                            <button class="card-btn btn-play" onclick="alert('Chat gestartet!')">Play</button>
                            <button class="card-btn btn-edit" onclick="alert('Editieren öffnen...')">Edit</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- SEKTION: WELTEN -->
        <div id="worlds-section" class="content-section">
            <div class="cards-grid">
                <!-- Erstellen Button für Welten -->
                <div class="create-card" onclick="alert('Welten-Erstellung öffnen...')">
                    <div class="plus-icon">+</div>
                    <span>Create World</span>
                </div>

                <!-- PLATZHALTER WELT (Beispiel RPG Cyberpunk World) -->
                <div class="item-card">
                    <span class="world-badge">5 Cards</span>
                    <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400&auto=format&fit=crop&q=80');"></div>
                    <div class="card-overlay"></div>
                    <div class="card-content">
                        <div class="card-title">Neo-Tokyo 2077</div>
                        <div class="card-meta">
                            <span>Von: ModderX</span>
                            <span>Cyberpunk RPG</span>
                        </div>
                        <div class="card-actions">
                            <button class="card-btn btn-play" onclick="alert('Welt-RPG gestartet!')">Enter</button>
                            <button class="card-btn btn-edit" onclick="alert('Welten-Editor öffnen...')">Cards</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Funktion zum Wechseln zwischen Characters und Worlds Tabs
        function switchTab(tabName) {
            // Alle Sektionen verstecken
            document.querySelectorAll('.content-section').forEach(section => {
                section.classList.remove('active');
            });
            // Alle Nav-Buttons deaktivieren
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Aktive Sektion und Button einschalten
            if(tabName === 'characters') {
                document.getElementById('characters-section').classList.add('active');
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('searchBar').placeholder = "Searching for characters...";
            } else {
                document.getElementById('worlds-section').classList.add('active');
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('searchBar').placeholder = "Searching for worlds...";
            }
        }

        // Setup der initialen Suchleiste
        document.getElementById('searchBar').placeholder = "Searching for characters...";
    </script>
</body>
</html>

        function buildMemoryDocumentFromMessage(msg, index = 0) {
            if (!msg || msg.isLoading) return null;
            const content = normalizeMemoryText(msg.text || msg.content, 1200);
            if (!content) return null;

            const role = msg.role || (msg.sender === 'bot' || msg.sender === 'assistant' ? 'assistant' : 'user');
            const sender = msg.sender === 'bot' ? 'assistant' : (msg.sender || role);
            const messageId = ensureMessageId(msg, index);
            const storageCharacterId = getMemoryStorageId();

            return {
                messageId: String(messageId),
                role,
                sender,
                content,
                characterId: Number.isFinite(storageCharacterId) ? storageCharacterId : -1,
                timestamp: Number(msg.timestamp) || Date.now()
            };
        }

        function enqueueMemoryTask(task) {
            memoryTaskChain = memoryTaskChain
                .then(() => task())
                .catch(err => {
                    console.warn('Background memory task failed:', err);
                });
            return memoryTaskChain;
        }

        // Unified insert used by all call sites instead of calling oramaInsert()
        // directly. Writes into Orama (lexical index) AND, when the Transformer.js
        // vector backend is active, also computes the embedding and writes into
        // vectorDB - so both indexes always stay in sync with each other.
        async function memoryInsert(text, metadata = {}) {
            const doc = {
                messageId: metadata.messageId ? String(metadata.messageId) : '',
                role: metadata.role || 'user',
                sender: metadata.sender || metadata.role || 'user',
                content: String(text ?? metadata.content ?? ''),
                characterId: Number.isFinite(metadata.characterId) ? metadata.characterId : -1,
                timestamp: Number(metadata.timestamp) || Date.now()
            };
            if (!doc.content) return doc;

            const tasks = [];
            if (typeof oramaInsert === 'function' && oramaDB) {
                tasks.push(oramaInsert(oramaDB, doc));
            }
            if (isTransformerJsActive && typeof vectorInsert === 'function') {
                tasks.push(vectorInsert(doc));
            }
            if (tasks.length) {
                await Promise.all(tasks);
            }
            return doc;
        }

        // Unified Hybrid Search. Queries Orama (lexical/keyword search) and, when
        // active, the Transformer.js vector backend (semantic search) in parallel,
        // then merges the two ranked hit lists with Reciprocal Rank Fusion (RRF):
        // each hit's score is 1 / (k + rank), scores for the same memory entry are
        // summed across backends, and the combined list is sorted and de-duplicated.
        // This means a memory that ranks well in BOTH lexical and semantic search
        // rises to the top, while a memory found by only one backend still counts.
        async function memorySearch(query, limit = MEMORY_RETRIEVAL_LIMIT) {
            const RRF_K = 60; // standard RRF smoothing constant
            const ranked = new Map(); // dedupe key -> { score, hit }

            const addRankedHits = (hits) => {
                (Array.isArray(hits) ? hits : []).forEach((hit, index) => {
                    const documentData = hit?.document || hit || {};
                    const key = documentData.messageId
                        ? `id:${documentData.messageId}`
                        : `text:${normalizeMemoryText(documentData.content, 1200).toLowerCase()}`;
                    if (!key || key === 'id:' || key === 'text:') return;

                    const rrfScore = 1 / (RRF_K + index + 1);
                    const existing = ranked.get(key);
                    if (existing) {
                        existing.score += rrfScore;
                    } else {
                        ranked.set(key, { score: rrfScore, hit });
                    }
                });
            };

            const searchTasks = [];

            if (query && typeof oramaSearch === 'function' && oramaDB) {
                searchTasks.push(
                    oramaSearch(oramaDB, { term: query, properties: ['content'], limit, tolerance: 1 })
                        .then(results => addRankedHits(results?.hits))
                        .catch(err => console.warn('Orama (lexical) memory search failed:', err))
                );
            }

            if (query && isTransformerJsActive && typeof vectorSearch === 'function') {
                searchTasks.push(
                    vectorSearch(query, limit)
                        .then(results => addRankedHits(results?.hits))
                        .catch(err => console.warn('Transformer.js (semantic) memory search failed:', err))
                );
            }

            if (searchTasks.length) {
                await Promise.all(searchTasks);
            }

            return [...ranked.values()]
                .sort((a, b) => b.score - a.score)
                .slice(0, limit)
                .map(entry => entry.hit);
        }

        function scheduleBackgroundTask(task, delay = 0) {
            const runner = () => {
                enqueueMemoryTask(async () => {
                    await task();
                });
            };

            if (typeof window.requestIdleCallback === 'function') {
                window.requestIdleCallback(runner, { timeout: 1200 });
                return;
            }

            window.setTimeout(runner, delay);
        }

        async function indexMessageInBackground(msg, index = 0) {
            const doc = buildMemoryDocumentFromMessage(msg, index);
            if (!doc || (!oramaDB && !isTransformerJsActive)) return;
            if (indexedMemoryMessageIds.has(doc.messageId)) return;

            await memoryInsert(doc.content, doc);
            indexedMemoryMessageIds.add(doc.messageId);
        }

        function queueMessageIndex(msg, index = 0) {
            const doc = buildMemoryDocumentFromMessage(msg, index);
            if (!doc || (!oramaDB && !isTransformerJsActive)) return;
            if (indexedMemoryMessageIds.has(doc.messageId)) return;

            scheduleBackgroundTask(async () => {
                await indexMessageInBackground(msg, index);
            });
        }

        async function rebuildMemoryIndexFromChatHistory(historyMessages = null) {
            if (typeof resetMemoryBackend !== 'function') return;
            await resetMemoryBackend();
            if (!oramaDB && !isTransformerJsActive) return;

            const visibleMessages = getVisibleHistoryMessages(historyMessages);
            for (let i = 0; i < visibleMessages.length; i++) {
                const doc = buildMemoryDocumentFromMessage(visibleMessages[i], i);
                if (!doc) continue;
                await memoryInsert(doc.content, doc);
                indexedMemoryMessageIds.add(doc.messageId);
            }
        }

        function scoreSummaryMessage(msg) {
            const text = normalizeMemoryText(msg?.text || '', 320);
            if (!text) return 0;

            let score = Math.min(12, Math.ceil(text.length / 30));
            if (msg.sender === 'user') score += 2;
            if (favoriteMessages.includes(msg.id)) score += 4;
            if (/[!?]/.test(text)) score += 1;
            if (/\b(remember|important|promise|secret|love|hate|family|birthday|age|goal|plan|name)\b/i.test(text)) score += 3;
            return score;
        }

        function buildSummaryFromMessages(messages) {
            if (!Array.isArray(messages) || !messages.length) return '';

            const chunkSize = 6;
            const summaryLines = [];

            for (let index = 0; index < messages.length; index += chunkSize) {
                const chunk = messages.slice(index, index + chunkSize);
                const highlights = [...chunk]
                    .sort((a, b) => scoreSummaryMessage(b) - scoreSummaryMessage(a))
                    .slice(0, 2)
                    .map(msg => `${buildSpeakerLabel(msg)}: ${normalizeMemoryText(msg.text, 140)}`)
                    .filter(Boolean);

                if (!highlights.length) continue;
                summaryLines.push(`- ${highlights.join(' | ')}`);
                if (summaryLines.join('\n').length >= MEMORY_SUMMARY_CHAR_LIMIT) break;
            }

            return summaryLines.join('\n').slice(0, MEMORY_SUMMARY_CHAR_LIMIT).trim();
        }

        async function compressChatHistory(historyMessages = chatHistory, { persist = true } = {}) {
            const visibleMessages = getVisibleHistoryMessages(historyMessages);
            const olderMessages = visibleMessages.slice(0, Math.max(0, visibleMessages.length - MEMORY_WORKING_SET_LIMIT));

            const nextState = getDefaultMemoryState();
            if (olderMessages.length >= MEMORY_COMPRESSION_THRESHOLD - MEMORY_WORKING_SET_LIMIT) {
                nextState.storySummary = buildSummaryFromMessages(olderMessages);
                nextState.sourceMessageCount = olderMessages.length;
                nextState.updatedAt = Date.now();
            }

            if (persist) {
                memoryState = nextState;
                await saveMemoryState();
            }

            return nextState;
        }

        function scheduleChatCompression() {
            if (compressionDebounceTimer) {
                clearTimeout(compressionDebounceTimer);
            }

            compressionDebounceTimer = window.setTimeout(() => {
                compressionDebounceTimer = null;
                scheduleBackgroundTask(async () => {
                    await compressChatHistory(chatHistory);
                });
            }, 180);
        }

        function resolveMemoryFromSearchHit(hit, allowedMessageIds = null) {
            const documentData = hit?.document || hit || {};
            const messageId = documentData.messageId ? String(documentData.messageId) : '';
            if (allowedMessageIds && messageId && !allowedMessageIds.has(messageId)) return null;
            const sourceMessage = messageId
                ? chatHistory.find(msg => msg && String(msg.id) === messageId)
                : null;

            if (sourceMessage) {
                if (!isMessageVisible(sourceMessage) || sourceMessage.isLoading) return null;
                return {
                    id: sourceMessage.id,
                    sender: sourceMessage.sender,
                    text: String(sourceMessage.text || '').trim(),
                    messageId: sourceMessage.id,
                    timestamp: sourceMessage.timestamp || documentData.timestamp || Date.now()
                };
            }

            const fallbackText = normalizeMemoryText(documentData.content, 1200).toLowerCase();
            if (!fallbackText) return null;

            const fallbackMemory = memories.find(memory => normalizeMemoryText(memory?.text, 1200).toLowerCase() === fallbackText);
            return fallbackMemory || null;
        }

        async function getRelevantMemories(historyMessages = null) {
            const visibleMessages = getVisibleHistoryMessages(historyMessages);
            const allowedMessageIds = new Set(visibleMessages.map((msg, index) => String(ensureMessageId(msg, index))));
            const recentUserMessages = visibleMessages
                .filter(msg => msg.sender === 'user')
                .slice(-MEMORY_QUERY_MESSAGE_COUNT);

            const queryText = recentUserMessages
                .map(msg => normalizeMemoryText(msg.text, 320))
                .filter(Boolean)
                .join('\n');

            const recentWorkingMessages = getWorkingMemoryMessages(historyMessages);
            const excludedMessageIds = new Set(recentWorkingMessages.map(msg => String(msg.id || '')));
            const excludedTexts = new Set(recentWorkingMessages.map(msg => normalizeMemoryText(msg.text, 1200).toLowerCase()));

            if (queryText) {
                try {
                    const searchHits = await memorySearch(queryText, MEMORY_RETRIEVAL_LIMIT + 8);

                    const selectedMemories = [];
                    const seenIds = new Set();

                    for (const hit of searchHits) {
                        const memory = resolveMemoryFromSearchHit(hit, allowedMessageIds);
                        if (!memory) continue;

                        const memoryId = String(memory.messageId || memory.id || '');
                        const normalizedText = normalizeMemoryText(memory.text, 1200).toLowerCase();
                        if (!normalizedText) continue;
                        if ((memoryId && excludedMessageIds.has(memoryId)) || excludedTexts.has(normalizedText)) continue;
                        if (memoryId && seenIds.has(memoryId)) continue;
                        if (memoryId) seenIds.add(memoryId);

                        selectedMemories.push(memory);
                        if (selectedMemories.length >= MEMORY_RETRIEVAL_LIMIT) break;
                    }

                    if (selectedMemories.length) {
                        return selectedMemories;
                    }
                } catch (err) {
                    console.warn('Hybrid memory search failed:', err);
                }
            }

            return memories
                .filter(memory => {
                    const memoryId = String(memory?.messageId || memory?.id || '');
                    const normalizedText = normalizeMemoryText(memory?.text, 1200).toLowerCase();
                    return normalizedText && !excludedTexts.has(normalizedText) && !excludedMessageIds.has(memoryId);
                })
                .sort((a, b) => (b?.timestamp || 0) - (a?.timestamp || 0))
                .slice(0, MEMORY_RETRIEVAL_LIMIT);
        }

        async function initializeIntroductoryChat() {
            const intros = Array.isArray(currentCharacter.introductions)
                ? currentCharacter.introductions.filter(text => text && text.trim())
                : [];

            if (!intros.length) {
                await generateInitialGreeting();
                return;
            }

            const groupId = `${currentCharacter.id}_intro`;
            chatHistory = intros.map((text, index) => ({
                sender: 'bot',
                name: currentCharacter.name,
                text: text.trim(),
                avatar: currentCharacter.avatar,
                rerollGroupId: groupId,
                versionNumber: index + 1,
                versionCount: intros.length,
                isIntro: true
            }));
            refreshRerollGroups();
            setGroupDisplayVersion(groupId, 1);
            for (const msg of chatHistory) {
                await storeMessageAsMemory(msg);
            }
            await saveChatHistory();
            await compressChatHistory(chatHistory);
            await rebuildMemoryIndexFromChatHistory(chatHistory);
            renderChatLog();
        }

        function refreshRerollGroups() {
            const grouped = {};
            chatHistory.forEach(msg => {
                if (msg.rerollGroupId) {
                    grouped[msg.rerollGroupId] = grouped[msg.rerollGroupId] || [];
                    grouped[msg.rerollGroupId].push(msg);
                }
            });
            for (const groupId in grouped) {
                const versions = grouped[groupId].sort((a, b) => a.versionNumber - b.versionNumber);
                const count = versions.length;
                versions.forEach(msg => {
                    msg.versionCount = count;
                });
            }
        }

        function getGroupDisplayVersion(groupId) {
            if (!groupId) return null;
            if (!window.groupDisplayVersion) window.groupDisplayVersion = {};
            let version = window.groupDisplayVersion[groupId];
            
            const versions = chatHistory.filter(msg => msg.rerollGroupId === groupId);
            if (!versions.length) return null;
            
            const validVersions = versions.map(msg => msg.versionNumber);
            if (!version || !validVersions.includes(version)) {
                const introGroupDefaultFirst = String(groupId).endsWith('_intro');
                version = introGroupDefaultFirst
                    ? Math.min(...validVersions)
                    : Math.max(...validVersions);
                window.groupDisplayVersion[groupId] = version;
                saveGroupDisplayVersions();
            }
            return version;
        }

        function setGroupDisplayVersion(groupId, version) {
            if (!window.groupDisplayVersion) window.groupDisplayVersion = {};
            window.groupDisplayVersion[groupId] = version;
            saveGroupDisplayVersions();
        }

        function isMessageVisible(msg) {
            if (!msg.rerollGroupId) return true;
            return msg.versionNumber === getGroupDisplayVersion(msg.rerollGroupId);
        }

        async function deleteMessagePair(msgIndex) {
            if (isWaitingForAI) return;
            if (isEditingAiMessage) return;

            const targetMsg = chatHistory[msgIndex];
            if (!targetMsg) return;
            if (activeSpeechMessageId && targetMsg.id === activeSpeechMessageId) {
                stopSpeaking();
            }

            const introGroup = targetMsg.rerollGroupId && String(targetMsg.rerollGroupId).endsWith('_intro');
            const isIntroMessage = Boolean(targetMsg.isIntro || introGroup || (targetMsg.sender === 'bot' && msgIndex === 0 && chatHistory.length > 0 && chatHistory[0].sender === 'bot' && chatHistory[0].isLoading === false));
            if (isIntroMessage) {
                return;
            }

            if (confirm("Möchtest du diese Nachricht und die dazugehörige Unterhaltung wirklich löschen?")) {
                const indicesToRemove = new Set([msgIndex]);
                const groupIdsToClear = new Set();
                const messageIdsToRemove = new Set();

                // Alle Reroll-Varianten einer Bot-Nachricht mitlöschen, nicht nur die
                // gerade sichtbare Version - sonst "überlebt" die Nachricht einfach in
                // einer anderen Version und taucht nach dem Löschen wieder auf.
                const collectRerollSiblings = (msg) => {
                    if (msg && msg.sender === 'bot' && msg.rerollGroupId) {
                        groupIdsToClear.add(msg.rerollGroupId);
                        chatHistory.forEach((m, idx) => {
                            if (m.rerollGroupId === msg.rerollGroupId) indicesToRemove.add(idx);
                        });
                    }
                };

                collectRerollSiblings(targetMsg);

                if (targetMsg.sender === 'bot') {
                    const previousMsg = chatHistory[msgIndex - 1];
                    if (previousMsg && previousMsg.sender === 'user') {
                        indicesToRemove.add(msgIndex - 1);
                    }
                } else if (targetMsg.sender === 'user') {
                    const nextMsg = chatHistory[msgIndex + 1];
                    if (nextMsg && nextMsg.sender === 'bot') {
                        indicesToRemove.add(msgIndex + 1);
                        collectRerollSiblings(nextMsg);
                    }
                }

                indicesToRemove.forEach(idx => {
                    const msg = chatHistory[idx];
                    if (msg && msg.id) messageIdsToRemove.add(msg.id);
                });
                chatHistory = chatHistory.filter((msg, idx) => !indicesToRemove.has(idx) && !(msg && msg.id && messageIdsToRemove.has(msg.id)));

                // Verwaiste Seiten-/Versionszeiger für komplett gelöschte Reroll-Gruppen
                // entfernen, damit sich in der Datenbank kein Datenmüll ansammelt.
                if (groupIdsToClear.size && window.groupDisplayVersion) {
                    groupIdsToClear.forEach(gid => delete window.groupDisplayVersion[gid]);
                    await saveGroupDisplayVersions();
                }

                refreshRerollGroups();
                // Memory-Kontext neu aufbauen, damit gelöschte Nachrichten nicht mehr
                // als "Erinnerung" in zukünftige AI-Prompts einfließen.
                await syncMemoriesFromChatHistory();
                await compressChatHistory(chatHistory);
                await saveChatHistory();
                await rebuildMemoryIndexFromChatHistory(chatHistory);
                renderChatLog();
            }
        }

        function getCharacterName() {
            const candidates = [
                currentCharacter?.characterName,
                currentCharacter?.character_name,
                currentCharacter?.storyName,
                currentCharacter?.story_name,
                currentCharacter?.name
            ];
            const resolved = candidates.find(value => typeof value === 'string' && value.trim());
            return resolved ? resolved.trim() : 'Character';
        }

        function getPermanentIdentityFacts(characterName) {
            const lines = [];

            lines.push(`Character Name: ${characterName}`);
            if (currentCharacter?.storyName && currentCharacter.storyName.trim() && currentCharacter.storyName.trim() !== characterName) {
                lines.push(`Story Name: ${currentCharacter.storyName.trim()}`);
            }

            const characterAge = Number.isFinite(currentCharacter?.age) ? currentCharacter.age : parseInt(currentCharacter?.age, 10);
            if (Number.isFinite(characterAge)) lines.push(`Age: ${characterAge} years old`);

            const birthMonthNum = parseInt(currentCharacter?.birthMonth, 10);
            const birthDayNum = parseInt(currentCharacter?.birthDay, 10);
            if (Number.isFinite(birthMonthNum) && birthMonthNum >= 1 && birthMonthNum <= 12 && Number.isFinite(birthDayNum)) {
                const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
                lines.push(`Birthday: ${monthNames[birthMonthNum - 1]} ${birthDayNum}`);
            }

            if (currentCharacter?.generally) lines.push(`General Character Traits: ${currentCharacter.generally}`);
            if (currentCharacter?.appearance) lines.push(`Appearance: ${currentCharacter.appearance}`);
            if (currentCharacter?.personality) lines.push(`Personality: ${currentCharacter.personality}`);
            if (currentCharacter?.description) lines.push(`Description: ${currentCharacter.description}`);
            if (Array.isArray(currentCharacter?.secrets) && currentCharacter.secrets.length) {
                lines.push(`Secrets: ${currentCharacter.secrets.filter(Boolean).join('; ')}`);
            }

            if (selectedPersona) {
                lines.push(`Active Persona: ${selectedPersona.name}`);
                if (selectedPersona.generally) lines.push(`Persona Traits: ${selectedPersona.generally}`);
                if (selectedPersona.appearance) lines.push(`Persona Appearance: ${selectedPersona.appearance}`);
            }

            return lines;
        }

        async function buildCharacterPrompt(historyMessages = [], { mode = 'reply' } = {}) {
            const characterName = getCharacterName();
            const history = Array.isArray(historyMessages) ? historyMessages : chatHistory;
            const workingMemory = getWorkingMemoryMessages(history);
            const memoryContext = await getRelevantMemories(history);
            const favoriteMessageContext = getFavoriteMessageContext(history);
            const summaryState = await compressChatHistory(history, { persist: history === chatHistory });

            const textSizeInstruction = settings.textSize === 'Short'
                ? 'Keep replies short and concise.'
                : settings.textSize === 'Long'
                    ? 'Use longer, more detailed replies.'
                    : 'Use moderate response length.';
            const languageInstruction = settings.language === 'German'
                ? 'Antworten auf Deutsch.'
                : settings.language === 'Spanish'
                    ? 'Responde en español.'
                    : settings.language === 'French'
                        ? 'Répondre en français.'
                        : 'Answer in English.';

            const lines = [];
            lines.push(`[System Prompt]`);
            lines.push(`You are ${characterName}. Stay fully in character at all times and never break the fourth wall.`);
            lines.push(`If The User addresses you directly, respond as ${characterName}.`);
            lines.push('Use vivid, immersive prose and keep the reply emotionally grounded.');
            lines.push('Wrap spoken dialogue in double quotes. Use asterisks only for actions or expressions. Do not keep the asterisks in the final rendered text.');
            lines.push(`Response Style: ${languageInstruction} ${textSizeInstruction}`);

            if (mode === 'intro') {
                lines.push(`Task: Write an introductory greeting that feels like the first meeting with ${characterName}.`);
            } else if (mode === 'reroll') {
                lines.push(`Task: Generate a fresh alternative reply as ${characterName}, while remaining consistent with the established memory.`);
            } else {
                lines.push(`Task: Answer the latest message from The User as ${characterName}.`);
            }

            lines.push('');
            lines.push(`[Level 1: Core Facts & Favorites]`);
            getPermanentIdentityFacts(characterName).forEach(line => lines.push(`- ${line}`));
            if (favoriteMessageContext.length) {
                lines.push('Pinned Favorite Messages:');
                favoriteMessageContext.forEach(message => {
                    lines.push(`- ${buildSpeakerLabel(message, characterName)}: ${normalizeMemoryText(message.text, 180)}`);
                });
            }

            if (memoryContext.length) {
                lines.push('');
                lines.push(`[Level 2: Semantic Long-Term Memory]`);
                memoryContext.forEach(memory => {
                    lines.push(`- ${buildSpeakerLabel(memory, characterName)}: ${normalizeMemoryText(memory.text, 180)}`);
                });
            }

            if (summaryState?.storySummary) {
                lines.push('');
                lines.push(`[Level 3: Story Summary]`);
                lines.push(summaryState.storySummary);
            }

            lines.push('');
            lines.push(`[Level 4: Working Memory]`);
            workingMemory.forEach(msg => {
                lines.push(`${buildSpeakerLabel(msg, characterName)}: ${normalizeMemoryText(msg.text, 1200)}`);
            });
            lines.push(`${characterName}:`);
            return lines.join('\n');
        }

        async function buildAIPromptForReroll(targetMessage = null) {
            const history = Array.isArray(chatHistory) ? chatHistory : [];
            let targetIndex = -1;

            if (targetMessage) {
                targetIndex = history.findIndex(msg => msg === targetMessage);
            }

            if (targetIndex === -1) {
                targetIndex = history.length;
            }

            const historyBeforeTarget = history.slice(0, targetIndex).filter(msg => !msg.isLoading);
            return await buildCharacterPrompt(historyBeforeTarget, { mode: 'reroll' });
        }

        function getLastVisibleBotMessage() {
            const visibleHistory = chatHistory.filter(msg => isMessageVisible(msg));
            for (let i = visibleHistory.length - 1; i >= 0; i--) {
                if (visibleHistory[i].sender === 'bot') return visibleHistory[i];
            }
            return null;
        }

        async function rerollLatestBotMessage() {
            if (isWaitingForAI) return;
            if (isEditingAiMessage) return;
            const lastBot = getLastVisibleBotMessage();
            if (!lastBot) return;
            stopSpeaking();

            const effectiveName = getCharacterName();
            if (lastBot.rerollGroupId && String(lastBot.rerollGroupId).endsWith('_intro')) {
                return;
            }

            const groupId = lastBot.rerollGroupId || 'group_' + Date.now();
            const originalIdx = chatHistory.findIndex(m => m === lastBot);
            if (originalIdx === -1) return;

            if (!lastBot.rerollGroupId) {
                lastBot.rerollGroupId = groupId;
                lastBot.versionNumber = 1;
                lastBot.versionCount = 1;
            }

            // Die neue Versionsnummer basiert auf der höchsten bereits existierenden
            // Version in dieser Gruppe (nicht auf der aktuell angezeigten Seite!).
            // Das verhindert Kollisionen, falls man z.B. auf Seite 1/3 zurücknavigiert
            // und dort erneut rerollt.
            const existingVersions = chatHistory.filter(m => m.rerollGroupId === groupId);
            const existingVersionNumbers = existingVersions.map(m => m.versionNumber || 1);
            const highestVersionNumber = Math.max(lastBot.versionNumber || 1, ...existingVersionNumbers);
            const nextVersionNumber = highestVersionNumber + 1;
            const nextVersionCount = existingVersions.length + 1;

            const pendingMessage = {
                ...lastBot,
                id: generateMessageId(chatHistory.length),
                sender: 'bot',
                name: effectiveName,
                characterName: effectiveName,
                text: '',
                avatar: currentCharacter.avatar,
                rerollGroupId: groupId,
                versionNumber: nextVersionNumber,
                versionCount: nextVersionCount,
                isLoading: true,
                isReroll: true
            };

            chatHistory.push(pendingMessage);
            refreshRerollGroups();
            // Sofort auf die neue Seite springen, damit man direkt den Ladezustand
            // der neuen Version sieht, statt bis zum Ende der Generierung auf der
            // alten Seite "hängen" zu bleiben.
            setGroupDisplayVersion(groupId, nextVersionNumber);
            saveChatHistory();
            renderChatLog();
            setLoadingState(true);

            try {
                const targetMemoryText = String(lastBot.text || '').trim().toLowerCase();
                memories = memories.filter(memory => {
                    const memoryText = String(memory?.text || '').trim().toLowerCase();
                    return memoryText !== targetMemoryText;
                });
                saveMemories();

                let prompt = await buildAIPromptForReroll(lastBot);
                prompt = await injectOramaContext(prompt);
                const responseText = await perchanceBridge.generateText(prompt, ['The User:', '\nThe User:']);
                const normalizedResponse = String(responseText || '').trim();
                if (!normalizedResponse) {
                    throw new Error('Verbindung zum KI-Server blockiert');
                }
                await finalizePendingBotMessage(pendingMessage, normalizedResponse);

                refreshRerollGroups();
                setGroupDisplayVersion(groupId, nextVersionNumber);
                await syncMemoriesFromChatHistory();
                await saveChatHistory();
                renderChatLog();
            } catch (error) {
                console.error('AI Error:', error);
                const friendlyMessage = getFriendlyAiErrorMessage(error);
                await finalizePendingBotMessage(pendingMessage, friendlyMessage);
                refreshRerollGroups();
                setGroupDisplayVersion(groupId, nextVersionNumber);
                await syncMemoriesFromChatHistory();
                await saveChatHistory();
                renderChatLog();
                if (friendlyMessage !== 'Verbindung zum KI-Server blockiert') {
                    alert(`AI Generation Error: ${error.message}`);
                }
            } finally {
                setLoadingState(false);
            }
        }

        async function navigateRerollVersion(groupId, direction) {
            const versions = chatHistory
                .filter(msg => msg.rerollGroupId === groupId)
                .sort((a, b) => a.versionNumber - b.versionNumber);
            if (!versions.length) return;
            let current = getGroupDisplayVersion(groupId);
            if (!current) current = versions[versions.length - 1].versionNumber;
            let next = current + direction;
            if (next < 1) next = 1;
            if (next > versions.length) next = versions.length;
            setGroupDisplayVersion(groupId, next);
            await syncMemoriesFromChatHistory();
            renderChatLog();
        }

        function updatePersonaButton() {
            const btn = document.getElementById('personaSelectBtn');
            if (!btn) return;
            btn.innerText = selectedPersona ? selectedPersona.name : 'Choose persona';
        }

        function togglePersonaMenu(event) {
            if (event) event.stopPropagation();
            if (isEditingAiMessage) return;
            isPersonaMenuOpen = !isPersonaMenuOpen;
            renderPersonaMenu();
        }

        function closePersonaMenu() {
            isPersonaMenuOpen = false;
            renderPersonaMenu();
        }

        function handleBackToHub() {
            if (isEditingAiMessage) return;
            window.location.href = '../index.html';
        }

        function getLastVisibleBotMessage() {
            normalizeChatHistoryIds();
            const visibleMessages = chatHistory.filter(msg => isMessageVisible(msg));
            for (let i = visibleMessages.length - 1; i >= 0; i--) {
                if (visibleMessages[i] && visibleMessages[i].sender === 'bot') return visibleMessages[i];
            }
            return null;
        }

        function openEditMessageModal(messageId) {
            if (isWaitingForAI) return;
            if (!messageId) return;
            const lastBot = getLastVisibleBotMessage();
            if (!lastBot || lastBot.id !== messageId) return;
            if (lastBot.isLoading) return;

            isEditingAiMessage = true;
            editingMessageId = messageId;

            const textarea = document.getElementById('editMsgTextarea');
            const backdrop = document.getElementById('editMsgBackdrop');
            const modal = document.getElementById('editMsgModal');
            if (!textarea || !backdrop || !modal) return;

            textarea.value = typeof lastBot.text === 'string' ? lastBot.text : '';
            backdrop.style.display = 'block';
            modal.style.display = 'flex';

            applyInteractionLocks();
            renderChatLog();
            setTimeout(() => {
                try { textarea.focus(); } catch (_) {}
            }, 0);
        }

        function closeEditMessageModal() {
            const backdrop = document.getElementById('editMsgBackdrop');
            const modal = document.getElementById('editMsgModal');
            if (backdrop) backdrop.style.display = 'none';
            if (modal) modal.style.display = 'none';
            isEditingAiMessage = false;
            editingMessageId = null;
            applyInteractionLocks();
            renderChatLog();
            const chatInput = document.getElementById('chatInput');
            if (chatInput && !chatInput.disabled) {
                try { chatInput.focus(); } catch (_) {}
            }
        }

        async function saveEditMessageModal() {
            const messageId = editingMessageId;
            if (!messageId) return;

            const textarea = document.getElementById('editMsgTextarea');
            if (!textarea) return;

            const nextText = String(textarea.value || '').replace(/\r\n/g, '\n').trim();
            if (!nextText) return;

            const lastBot = getLastVisibleBotMessage();
            if (!lastBot || lastBot.id !== messageId) return;

            const idx = chatHistory.findIndex(m => m && m.id === messageId);
            if (idx === -1) return;

            chatHistory[idx] = { ...chatHistory[idx], text: nextText };
            await saveChatHistory();
            await syncMemoriesFromChatHistory();
            await rebuildMemoryIndexFromChatHistory(chatHistory);
            closeEditMessageModal();
        }

        function updatePersonaSearch(event) {
            personaSearchQuery = event.target.value.toLowerCase();
            renderPersonaMenu();
        }

        function selectPersona(id) {
            selectedPersona = personas.find(p => p.id === id) || null;
            saveStoryPersonaId(selectedPersona ? id : null);
            isPersonaMenuOpen = false;
            updatePersonaButton();
            renderPersonaMenu();
        }

        function renderPersonaMenu() {
            const menu = document.getElementById('personaMenu');
            const list = document.getElementById('personaList');
            const searchInput = document.getElementById('personaSearchInput');
            if (!menu || !list || !searchInput) return;

            menu.style.display = isPersonaMenuOpen ? 'block' : 'none';
            searchInput.value = personaSearchQuery;

            const sortedPersonas = [...personas]
                .filter(persona => !selectedPersona || persona.id !== selectedPersona.id)
                .sort((a, b) => a.name.localeCompare(b.name));

            const filteredPersonas = sortedPersonas.filter(persona => {
                const searchText = `${persona.name}`.toLowerCase();
                return searchText.includes(personaSearchQuery);
            });

            list.innerHTML = filteredPersonas.length ? filteredPersonas.map(persona => {
                const hasCover = Boolean(persona.cover);
                return `
                    <button type="button" class="persona-list-item ${hasCover ? '' : 'no-cover'}" onclick="selectPersona(${persona.id})">
                        ${hasCover ? `
                            <span class="persona-preview">
                                <span class="persona-cover" style="background-image: url('${persona.cover}')"></span>
                                <span class="persona-label"><strong>${persona.name}</strong></span>
                            </span>
                        ` : `
                            <span class="persona-label"><strong>${persona.name}</strong></span>
                        `}
                    </button>
                `;
            }).join('') : '<div class="persona-menu-empty">No personas found. Create a persona in the hub.</div>';
        }

        function renderChatLog() {
            const logArea = document.getElementById('storyLog');
            
            normalizeChatHistoryIds();
            const visibleMessages = chatHistory.filter(msg => isMessageVisible(msg));
            const effectiveName = getCharacterName();
            const lastVisibleBotMessage = (() => {
                for (let i = visibleMessages.length - 1; i >= 0; i--) {
                    if (visibleMessages[i].sender === 'bot') return visibleMessages[i];
                }
                return null;
            })();

            renderNpcInfoModal();

            logArea.innerHTML = visibleMessages.map((msg, index) => {
                const isUser = (msg.sender === 'user');
                const formattedText = formatJanitorText(msg.text);
                const isLastBot = !isUser && msg === lastVisibleBotMessage;
                const groupId = msg.rerollGroupId;
                const introGroup = groupId && String(groupId).endsWith('_intro');
                const groupVersions = groupId ? chatHistory.filter(m => m.rerollGroupId === groupId).sort((a, b) => a.versionNumber - b.versionNumber) : [];
                const allowEdits = !isEditingAiMessage && isLastBot && !introGroup && !msg.isLoading;
                const editBtnHtml = allowEdits ? `
                    <button type="button" class="msg-edit-btn" title="Edit message" onclick="openEditMessageModal('${msg.id || ''}')">
                        <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zm2.92 2.33H5v-.92l9.06-9.06.92.92L5.92 19.58zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                    </button>
                ` : '';
                const contentHtml = msg.isLoading ? `
                    <div class="msg-content msg-content-loading">
                        <div class="msg-loading-dots" aria-label="Loading response">
                            <span></span><span></span><span></span>
                        </div>
                    </div>
                ` : `<div class="msg-content">${formattedText}</div>`;
                
                // Index im originalen chatHistory-Array finden, um das korrekte Löschen zu triggern
                const originalHistoryIndex = chatHistory.findIndex(m => m === msg);

                // Delete-Buttons nur anzeigen, wenn gerade keine KI-Antwort generiert wird.
                const showDeleteBtn = !isWaitingForAI && !isEditingAiMessage && (isUser || (!isUser && !msg.isIntro && !introGroup && !msg.isLoading));
                const deleteBtnHtml = showDeleteBtn ? `
                    <button type="button" class="msg-trash-btn" title="Delete message" onclick="deleteMessagePair(${originalHistoryIndex})">
                        <svg viewBox="0 0 24 24" style="width:14px; height:14px; fill:currentColor;"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                    </button>
                ` : '';
                const favoriteBtnHtml = (!isUser && !isEditingAiMessage && !msg.isLoading) ? `
                    <button type="button" class="msg-favorite-btn ${favoriteMessages.includes(msg.id) ? 'is-favorite' : ''}" title="Favorite message" onclick="toggleFavoriteMessage('${msg.id || ''}')">
                        <svg viewBox="0 0 24 24" style="width:14px; height:14px; fill:currentColor;"><path d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                    </button>
                ` : '';
                const isSpeakingThis = !isUser && activeSpeechMessageId === msg.id;
                const speakBtnHtml = (!isUser && !msg.isLoading && !isEditingAiMessage) ? `
                    <button type="button" class="msg-speak-btn ${isSpeakingThis ? 'is-speaking' : ''}" title="${isSpeakingThis ? 'Stop reading' : 'Read message'}" onclick="toggleSpeakMessage('${msg.id || ''}')">
                        ${isSpeakingThis ? `
                        <svg viewBox="0 0 24 24" style="width:15px; height:15px; fill:currentColor;"><path d="M6 6h12v12H6z"/></svg>
                        ` : `
                        <svg viewBox="0 0 24 24" style="width:15px; height:15px; fill:currentColor;"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                        `}
                    </button>
                ` : '';

                const showRerollControls = !isEditingAiMessage && isLastBot && !isUser && !introGroup && !msg.isLoading;
                const showVersionControls = !isEditingAiMessage && isLastBot && !isUser && !msg.isLoading && groupVersions.length > 1;
                
                const versionControls = showVersionControls ? `
                        <div class="msg-variant-controls">
                            <button type="button" class="control-btn control-btn-compact" onclick="navigateRerollVersion('${groupId}', -1)" title="Previous version">←</button>
                            <span class="msg-version-pill">${getGroupDisplayVersion(groupId)} / ${groupVersions.length}</span>
                            <button type="button" class="control-btn control-btn-compact" onclick="navigateRerollVersion('${groupId}', 1)" title="Next version">→</button>
                        </div>
                    ` : '';
                const rerollButton = showRerollControls ? `
                        <button type="button" class="control-btn control-btn-compact" onclick="rerollLatestBotMessage()" title="Create new variant">↻</button>
                    ` : '';
                const continueButton = showRerollControls ? `
                        <button type="button" class="control-btn control-btn-compact" onclick="continueConversation()" title="Continue">C</button>
                    ` : '';
                const controlRow = (versionControls || rerollButton || continueButton) ? `
                        <div class="msg-reroll-row">
                            ${versionControls}
                            ${rerollButton}
                            ${continueButton}
                        </div>
                    ` : '';
                const displayName = isUser
                    ? (msg.name || (selectedPersona && selectedPersona.name ? selectedPersona.name : 'You'))
                    : (msg.characterName || effectiveName || msg.name || currentCharacter.name);
                
                return `
                    <div class="msg-wrapper ${isUser ? 'user-msg-wrapper' : 'bot-msg-wrapper'}" data-message-id="${msg.id || ''}">
                        <div class="msg-bubble-avatar" style="background-image: url('${isUser ? 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&q=80' : msg.avatar}')"></div>
                        <div class="msg-bubble-body">
                            <div class="msg-header-row">
                                <div class="msg-sender-name">${displayName}</div>
                                <div class="msg-header-actions">
                                    ${editBtnHtml}
                                    ${speakBtnHtml}
                                    ${favoriteBtnHtml}
                                    ${deleteBtnHtml}
                                </div>
                            </div>
                            ${contentHtml}
                            ${controlRow}
                        </div>
                    </div>
                `;
            }).join('');

            logArea.scrollTop = logArea.scrollHeight;
        }

        async function buildAIPrompt() {
            return await buildCharacterPrompt(chatHistory, { mode: 'reply' });
        }

        async function injectOramaContext(basePrompt) {
            return basePrompt;
        }

        async function continueConversation() {
            if (isWaitingForAI) return;
            if (isEditingAiMessage) return;

            const pendingMsg = await addPendingBotMessage();
            setLoadingState(true);

            try {
                let prompt = await buildAIPrompt();
                prompt = await injectOramaContext(prompt);
                const responseText = await perchanceBridge.generateText(prompt, ['The User:', '\nThe User:']);
                const normalizedResponse = String(responseText || '').trim();
                if (!normalizedResponse) {
                    throw new Error('Verbindung zum KI-Server blockiert');
                }
                await finalizePendingBotMessage(pendingMsg, normalizedResponse);
            } catch (error) {
                console.error('AI Error:', error);
                const friendlyMessage = getFriendlyAiErrorMessage(error);
                await finalizePendingBotMessage(pendingMsg, friendlyMessage);
                if (friendlyMessage !== 'Verbindung zum KI-Server blockiert') {
                    alert(`AI Generation Error: ${error.message}`);
                }
            } finally {
                setLoadingState(false);
            }
        }

        async function addPendingBotMessage() {
            const effectiveName = getCharacterName();
            const pendingMsg = {
                sender: 'bot',
                name: effectiveName,
                characterName: effectiveName,
                text: '',
                avatar: currentCharacter.avatar,
                rerollGroupId: 'group_' + Date.now(),
                versionNumber: 1,
                versionCount: 1,
                isLoading: true
            };
            chatHistory.push(pendingMsg);
            await saveChatHistory();
            renderChatLog();
            return pendingMsg;
        }

        async function finalizePendingBotMessage(pendingMsg, text) {
            const targetIndex = chatHistory.findIndex(msg => msg === pendingMsg);
            if (targetIndex === -1) return;
            chatHistory[targetIndex] = {
                ...pendingMsg,
                text: text.trim(),
                isLoading: false
            };
            await storeMessageAsMemory(chatHistory[targetIndex]);
            await saveChatHistory();
            queueMessageIndex(chatHistory[targetIndex], targetIndex);
            scheduleChatCompression();
            renderChatLog();
        }

        async function generateInitialGreeting() {
            setLoadingState(true);
            const pendingMsg = await addPendingBotMessage();
            const prompt = await buildCharacterPrompt(chatHistory, { mode: 'intro' });
            const introGroupId = `${currentCharacter.id}_intro`;

            try {
                const responseText = await perchanceBridge.generateText(prompt, ['The User:']);
                const normalizedResponse = String(responseText || '').trim();
                if (!normalizedResponse) {
                    throw new Error('Verbindung zum KI-Server blockiert');
                }
                
                await finalizePendingBotMessage(pendingMsg, normalizedResponse);
                chatHistory = chatHistory.map(msg => msg && msg.id === pendingMsg.id ? {
                    ...msg,
                    text: normalizedResponse,
                    isLoading: false,
                    rerollGroupId: introGroupId,
                    versionNumber: 1,
                    versionCount: 1,
                    isIntro: true
                } : msg);
                await saveChatHistory();
                await syncMemoriesFromChatHistory();
                await rebuildMemoryIndexFromChatHistory(chatHistory);
                renderChatLog();
            } catch (error) {
                console.error("AI Error:", error);
                const friendlyMessage = getFriendlyAiErrorMessage(error);
                await finalizePendingBotMessage(pendingMsg, friendlyMessage);
                chatHistory = chatHistory.map(msg => msg && msg.id === pendingMsg.id ? {
                    ...msg,
                    text: friendlyMessage,
                    isLoading: false,
                    rerollGroupId: introGroupId,
                    versionNumber: 1,
                    versionCount: 1,
                    isIntro: true
                } : msg);
                await saveChatHistory();
                await syncMemoriesFromChatHistory();
                await rebuildMemoryIndexFromChatHistory(chatHistory);
                renderChatLog();
            } finally {
                setLoadingState(false);
            }
        }

        async function handleUserSend() {
            if (isWaitingForAI) return;
            if (isEditingAiMessage) return;
            
            const inputEl = document.getElementById('chatInput');
            const text = inputEl.value.trim();
            if (!text) return;

            stopSpeaking();

            const userMessage = {
                sender: 'user',
                name: selectedPersona && selectedPersona.name ? selectedPersona.name : 'Du',
                text: text
            };
            ensureMessageId(userMessage, chatHistory.length);
            chatHistory.push(userMessage);
            await storeMessageAsMemory(userMessage);
            queueMessageIndex(userMessage, chatHistory.length - 1);
            scheduleChatCompression();

            await removeDraft();
            inputEl.value = '';
            inputEl.style.height = '44px';
            await saveChatHistory();
            renderChatLog();

            const pendingMsg = await addPendingBotMessage();
            setLoadingState(true);

            try {
                const instruction = await buildAIPrompt();
                const aiResponse = await perchanceBridge.generateText(instruction, ['User:', '\nUser:']);
                const normalizedResponse = String(aiResponse || '').trim();
                if (!normalizedResponse) {
                    throw new Error('Verbindung zum KI-Server blockiert');
                }

                await finalizePendingBotMessage(pendingMsg, normalizedResponse);
            } catch (error) {
                console.error("AI Error:", error);
                const friendlyMessage = getFriendlyAiErrorMessage(error);
                await finalizePendingBotMessage(pendingMsg, friendlyMessage);
                if (friendlyMessage !== 'Verbindung zum KI-Server blockiert') {
                    alert(`AI Generation Error: ${error.message}`);
                }
            } finally {
                setLoadingState(false);
            }
        }

        function setLoadingState(isLoading) {
            const chatInput = document.getElementById('chatInput');
            if (isLoading && chatInput) {
                shouldRestoreChatInputFocus = document.activeElement === chatInput;
            }
            isWaitingForAI = isLoading;
            const logArea = document.getElementById('storyLog');
            if (isLoading && logArea) logArea.scrollTop = logArea.scrollHeight;
            applyInteractionLocks();
            if (!isWaitingForAI && !isEditingAiMessage && chatInput && !chatInput.disabled && !isMobileChatInput && shouldRestoreChatInputFocus) {
                try { chatInput.focus(); } catch (_) {}
            }
            renderChatLog();
        }

        function autoGrowTextarea(element) {
            element.style.height = "5px";
            element.style.height = (element.scrollHeight) + "px";
        }

        async function clearSessionChat() {
            if (confirm("Do you want to reset all chat history with this character?")) {
                stopSpeaking();
                try {
                    await db.table('chatHistory').delete(parseInt(currentCharacter.id, 10));
                } catch (err) {
                    console.warn('Error clearing chat history:', err);
                }
                chatHistory = [];
                memories = [];
                memoryState = getDefaultMemoryState();
                await saveMemories();
                await saveMemoryState();
                renderChatLog();
                // Reinitialize the active memory backend so it is reset as well
                try { await initMemorySystem(); } catch (e) { /* ignore */ }
                await generateInitialGreeting();
            }
        }

        document.getElementById('chatInput').addEventListener('keydown', function(e) {
            if (isEditingAiMessage) return;
            if (isMobileChatInput) return;
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleUserSend();
            }
        });

        window.addEventListener('beforeunload', (event) => {
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            if (isEditingAiMessage) {
                event.preventDefault();
                event.returnValue = '';
            }
        });

        window.onload = () => {
            initChatPage();
            applyInteractionLocks();
        };
    </script>
</body>
</html>
